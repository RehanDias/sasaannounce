<!DOCTYPE html>
<html>
<head>
  <title>Webhook Sender</title>
</head>
<body>
  <input type="text" id="msg" placeholder="Masukkan pesan">
  <button onclick="send()">Kirim</button>

  <script>
    async function send() {
      const message = document.getElementById("msg").value;

      const res = await fetch("MASUKKAN_WEBHOOK_URL_DISINI", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          content: message
        })
      });

      if (res.ok) {
        alert("Pesan terkirim");
      } else {
        alert("Error: " + res.status);
      }
    }
  </script>
</body>
</html>
