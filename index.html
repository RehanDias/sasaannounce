<!DOCTYPE html>
<html>
<head>
  <title>Webhook Sender</title>
</head>
<body>
  <input type="text" id="msg" placeholder="Masukkan pesan">
  <button onclick="send()">Kirim</button>

  <script>
    async function send() {
      const message = document.getElementById("msg").value;

      await fetch("https://discord.com/api/webhooks/1509562601418526780/j4JhywJ657eL3RUNk1ySsG4GII6LaIN4DNbE1IKNk5kyRvls0fchg1uUiCTmh4KnpM0s", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });

      alert("Pesan terkirim");
    }
  </script>
</body>
</html>
